name: Setup GSSOC Labels

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/labels-setup.yml'

jobs:
  setup-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Create or Update Labels
        uses: actions/github-script@v6
        with:
          script: |
            const labels = [
              // QUALITY (OPTIONAL) - Teal
              { name: "quality:clean", color: "c5f0ed", description: "Clean code quality" },
              { name: "quality:exceptional", color: "c5f0ed", description: "Exceptional code quality" },
              
              // TYPE BONUS (OPTIONAL) - Gray
              { name: "type:docs", color: "f1f2f6", description: "Documentation changes" },
              { name: "type:testing", color: "f1f2f6", description: "Testing related changes" },
              { name: "type:accessibility", color: "f1f2f6", description: "Accessibility improvements" },
              { name: "type:performance", color: "f1f2f6", description: "Performance optimizations" },
              { name: "type:security", color: "f1f2f6", description: "Security related changes" },
              { name: "type:design", color: "f1f2f6", description: "UI/UX design changes" },
              { name: "type:refactor", color: "f1f2f6", description: "Code refactoring" },
              { name: "type:devops", color: "f1f2f6", description: "DevOps and CI/CD changes" },
              { name: "type:bug", color: "f1f2f6", description: "Bug fixes" },
              { name: "type:feature", color: "f1f2f6", description: "New features" },
              
              // VALIDATION (ADMIN DECIDES)
              { name: "gssoc:approved", color: "c5f0ed", description: "PR approved for GSSoC" },
              { name: "gssoc:invalid", color: "ffcccb", description: "Invalid PR for GSSoC" },
              { name: "gssoc:spam", color: "ffcccb", description: "Spam PR for GSSoC" },
              { name: "gssoc:ai-slop", color: "ffcccb", description: "AI-generated low quality content" },
            ];

            for (const label of labels) {
              try {
                const { data: existingLabel } = await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
                
                console.log(`Updating label: ${label.name}`);
                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  new_name: label.name,
                  color: label.color,
                  description: label.description
                });
              } catch (error) {
                if (error.status === 404) {
                  console.log(`Creating label: ${label.name}`);
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                } else {
                  console.error(`Error processing label ${label.name}:`, error);
                }
              }
            }
